# Clang-safe compiler flags for packages whose C/BPF objects are built with
# clang (e.g. the sched-ext schedulers in sys-kernel/scx*).
#
# The global make.conf injects GCC-only flags that clang rejects at
# argument-parse time ("clang: error: unknown argument"):
#   GRAPHITE -> -fgraphite-identity -floop-nest-optimize
#   LTO      -> -flto=auto -fuse-linker-plugin -fdevirtualize-at-ltrans
# Because the failure happens while clang *parses* the positive flag, the
# -fno-* negation envs (no-graphite.conf, no-fuse-linker-plugin.conf, ...) do
# NOT help -- clang still sees and dies on the original flag. This env instead
# REDEFINES the flag vars to a clang-accepted subset, dropping GRAPHITE and LTO
# entirely (GCC also accepts this subset, so mixed gcc/clang builds are fine).
#
# Usage: add a line to /etc/portage/package.env/ , e.g.
#   sys-kernel/scx clang-safe.conf
COMMON_FLAGS="${COMMON_FLAGS_MINIMAL} ${DEBUG_FLAGS} ${EXTRA_OPT} ${SAFE_FAST_MATH}"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
