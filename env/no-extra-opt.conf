# Revert the global ${EXTRA_OPT} (-fno-semantic-interposition -fno-plt) for a
# package those flags miscompile. GCC 16 + -O3 mis-optimizes numpy's CPU-feature
# dispatch under -fno-semantic-interposition/-fno-plt, leaving a NULL function
# pointer that segfaults on the first BLAS dot (numpy fails its own import-time
# _sanity_check). The positive forms come last, so they win.
# Usage: add a line to /etc/portage/package.env/ , e.g.
#   dev-python/somepkg no-extra-opt.conf
CFLAGS="${CFLAGS} -fsemantic-interposition -fplt"
CXXFLAGS="${CXXFLAGS} -fsemantic-interposition -fplt"
FCFLAGS="${FCFLAGS} -fsemantic-interposition -fplt"
FFLAGS="${FFLAGS} -fsemantic-interposition -fplt"
