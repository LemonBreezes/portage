# Disable graphite loop optimization for a package that breaks or compiles too slowly
# under the global ${GRAPHITE}. The -fno-* come last, so they win.
# Usage: add a line to /etc/portage/package.env/ , e.g.
#   sci-libs/somepkg no-graphite.conf
CFLAGS="${CFLAGS} -fno-graphite-identity -fno-loop-nest-optimize"
CXXFLAGS="${CXXFLAGS} -fno-graphite-identity -fno-loop-nest-optimize"
FCFLAGS="${FCFLAGS} -fno-graphite-identity -fno-loop-nest-optimize"
FFLAGS="${FFLAGS} -fno-graphite-identity -fno-loop-nest-optimize"
