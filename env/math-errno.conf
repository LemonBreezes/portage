# Re-enable libm errno for a package that misbehaves under the global -fno-math-errno
# (e.g. it checks errno right after a math call). -fmath-errno comes last, so it wins.
# Usage: add a line to /etc/portage/package.env/ , e.g.
#   sci-libs/somepkg math-errno.conf
CFLAGS="${CFLAGS} -fmath-errno"
CXXFLAGS="${CXXFLAGS} -fmath-errno"
FCFLAGS="${FCFLAGS} -fmath-errno"
FFLAGS="${FFLAGS} -fmath-errno"
