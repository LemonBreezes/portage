# Upstream src/cups/Makefile.am has an install-data-hook that rmdir's the
# cups driver/filter/backend dirs in parallel with install-cupsexec_*PROGRAMS
# targets, racing under -j. Force serial install.
net-print/gutenprint no-parallel-build.conf

