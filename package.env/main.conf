# numpy + the numeric stack: GCC 16 -O3 miscompiles numpy's SIMD/CPU dispatch
# under the global EXTRA_OPT (-fno-semantic-interposition -fno-plt) -> a NULL
# indirect call -> segfault on the first BLAS dot, so numpy fails its own
# import-time _sanity_check. graphite is also disabled as a precaution for this
# loop-heavy numeric code. numexpr/bottleneck/pandas import numpy at build time,
# so they fail to build until numpy imports cleanly; give them the same safe
# profile since they are the same class of vectorized numeric code.
dev-python/numpy no-lto.conf no-graphite.conf no-extra-opt.conf
dev-python/numexpr no-graphite.conf no-extra-opt.conf
dev-python/bottleneck no-graphite.conf no-extra-opt.conf
dev-python/pandas no-graphite.conf no-extra-opt.conf
