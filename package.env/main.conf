# Bundled glaxnimate module has a real ODR violation (StaticOverrides /
# AnimatableImpl vtables) that only surfaces at LTO link, where the global
# -Werror=odr turns it fatal (lto-wrapper -> ld failure). Build it without LTO.
media-libs/mlt no-lto.conf

