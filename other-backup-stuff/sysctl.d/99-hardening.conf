# Kernel attack-surface hardening. Canonical copy; symlinked as
# /etc/sysctl.d/99-hardening.conf. Applied at boot, or via `sysctl --system`.

# io_uring is a large LPE surface with a long CVE history; disable entirely
kernel.io_uring_disabled = 2
# stop auto-loading line disciplines (TIOCSETD attack surface)
dev.tty.ldisc_autoload = 0
# Disable kexec, latched until reboot (one-way). NOTE: kexec_load_disabled
# gates the shared kexec_load_permitted() helper, so it blocks BOTH the
# legacy kexec_load() AND the signed kexec_file_load() — it is NOT selective
# to the legacy syscall. Safe here because nothing kexecs from the running
# system: no crashkernel= (kdump off) and the OpenRC 'kexec' fast-reboot
# service is not enabled. ZFSBootMenu is unaffected — it kexecs from its own
# kernel, not this one. If you ever want kdump or kexec fast-reboot, remove
# this line and reboot (it cannot be cleared on a running kernel).
kernel.kexec_load_disabled = 1
# ptrace: restricted (1) — blocks cross-process PTRACE_ATTACH but allows
# PTRACE_TRACEME, which Gentoo's sandbox requires for source builds (Go/Rust
# build helpers). Scope 2 needs CAP_SYS_PTRACE even for TRACEME, which the
# unprivileged portage user lacks -> sandbox ptrace ISE, builds fail. Raise
# to 2/3 only on a system that never compiles from source.
kernel.yama.ptrace_scope = 1
# harden the BPF JIT against spray (if/when JIT is enabled)
net.core.bpf_jit_harden = 2
# disable magic sysrq (physical-access surface); use 4 to keep only SAK
kernel.sysrq = 0
