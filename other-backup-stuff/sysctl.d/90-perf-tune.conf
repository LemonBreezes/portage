# Performance + low-latency tuning. Loaded BEFORE 99-local.conf (security hardening).
# Merged from previous pre-security sysctl.conf + LLM workload tweaks (Qwen3-235B mmap).
#
# What's NOT here (and why):
#   - net.ipv4.conf.*.accept_redirects / send_redirects — already set in 99-local.conf
#   - net.ipv4.icmp_echo_ignore_all — breaks ping for legitimate debugging
#   - net.ipv4.ip_forward — Docker manages this dynamically
#   - vm.compaction_proactiveness / THP defaults — already where we want via kernel build

# ============================================================================
# Memory / VM — tuned for huge mmap'd LLM models (Qwen3-235B = 140 GB)
# ============================================================================
# Default 65530 is exhausted by huge MoE models' tensor map count.
vm.max_map_count = 2097152

# Keep mmap'd model pages resident; don't swap them out under pressure.
vm.swappiness = 10

# "Always overcommit" — some ML allocators fail under the default heuristic
# even when there's actually plenty of RAM.
vm.overcommit_memory = 1

# Don't aggressively drop cached filesystem metadata; LLM loads re-mmap a lot.
vm.vfs_cache_pressure = 50

# Bound dirty pages tightly so writeback can't accumulate enough to stall
# everything when it flushes. NOTE: *_bytes overrides *_ratio (the kernel zeroes
# the ratio knobs once bytes are set), so we set bytes directly and omit the
# inert ratio lines. 48 MiB dirty / 16 MiB background = aggressive low-latency
# cap; raise dirty_bytes to 256 MiB (268435456) if bulk model *writes* throttle.
vm.dirty_background_bytes = 16777216
vm.dirty_bytes = 50331648

# Reserve 1 GB for the kernel under memory pressure.
vm.min_free_kbytes = 1048576

# More aggressive reclaim ramp; helps prevent OOM stalls.
vm.watermark_scale_factor = 500

# Lower lock contention on heavily-shared pages (mmap'd model files).
vm.page_lock_unfairness = 1

# Single-socket NUMA — no point reclaiming across zones.
vm.zone_reclaim_mode = 0

# Less periodic vmstat aggregation work across 32 threads → less scheduling jitter.
vm.stat_interval = 10

# ============================================================================
# Scheduler — desktop responsiveness
# ============================================================================
# Smaller CFS bandwidth slice (default 5000us → 3000us) cuts worst-case latency
# when many threads are contending; trades some throughput for snappiness.
kernel.sched_cfs_bandwidth_slice_us = 3000

# Auto-grouping by tty session helps desktop responsiveness with background loads.
kernel.sched_autogroup_enabled = 1

# ============================================================================
# Network — BBR + cake (modern stack)
# ============================================================================
net.core.default_qdisc = cake
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1
# Keep timestamps ON: BBR depends on accurate RTT sampling, and PAWS needs them
# on fast links. Modern kernels randomize the offset, so no uptime-leak concern.
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_slow_start_after_idle = 0

# Cap unsent data buffered per socket before pushing back on the writer. Cuts
# local queueing latency for streaming/interactive flows (token streaming, SSE,
# ssh over tailnet) without starving single-flow throughput. 128 KiB = balanced.
net.ipv4.tcp_notsent_lowat = 131072

# Connection lifecycle — quicker reuse, shorter FIN wait
net.ipv4.tcp_max_syn_backlog = 8192
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 10

# Keepalive — detect dead peers faster (60s vs default 7200s)
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6

# Deeper per-CPU ingress queue: fewer drops under HF-download / tailnet pps bursts.
net.core.netdev_max_backlog = 16384

# ============================================================================
# Network buffers — high-bandwidth (HF downloads, tailnet traffic)
# ============================================================================
net.core.rmem_default = 1048576
net.core.rmem_max = 16777216
net.core.wmem_default = 1048576
net.core.wmem_max = 16777216
net.core.optmem_max = 65536
net.ipv4.tcp_rmem = 4096 1048576 2097152
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192
