#!/usr/sbin/nft -f
# Default-deny inbound from LAN. Trust loopback, docker bridges, tailscale only.
# Lives in `inet filter_lan` to stay out of docker's `ip filter` table.

flush ruleset

table inet filter_lan {
	chain input {
		type filter hook input priority filter; policy drop;

		ct state vmap { established : accept, related : accept, invalid : drop }

		iifname { "lo", "tailscale0" } accept
		iifname "docker*" accept
		iifname "br-*" accept

		# ICMP / ICMPv6 — path MTU, NDP, RA, ping diagnostics
		meta l4proto icmp accept
		meta l4proto icmpv6 accept

		# DHCPv4 / DHCPv6 client
		udp sport 67 udp dport 68 accept
		udp sport 547 udp dport 546 accept

		# mDNS responses (printer discovery via Avahi)
		udp sport 5353 accept
	}
}
