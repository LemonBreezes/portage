# Low-latency / responsiveness tuning. Added 2026-05-29.
# No hardening reduction: all crypto here is strong AEAD; the rest just
# removes connect-time round-trips. Drop-in is Include'd by sshd_config.

# Skip reverse-DNS lookup of the client at connect time. A slow/unanswered
# PTR query is the most common cause of multi-second SSH connect stalls.
# (Default is already "no" in modern OpenSSH; set explicitly so it can't regress.)
UseDNS no

# (GSSAPI/Kerberos round-trip already absent — OpenSSH here is built without the
# kerberos USE flag, so there's nothing to disable.)

# Stream compression costs CPU and adds latency on a fast/WiFi link; off is the
# modern default — kept explicit.
Compression no

# Prefer AES-GCM: the Ryzen 9 9950X has AES-NI, so AES-GCM out-throughputs the
# chacha20-poly1305 default for scp/sftp bulk transfer. chacha20 retained as
# fallback for AES-NI-less clients. All three are strong AEAD ciphers.
Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,chacha20-poly1305@openssh.com
