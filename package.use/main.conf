# Source-built dist-kernel with module signing. The cert in
# /etc/kernel/signing_cert.pem (referenced from make.conf via
# MODULES_SIGN_CERT) gets embedded into the kernel's
# .builtin_trusted_keys, so signed in-tree and out-of-tree
# modules (zfs.ko etc.) are accepted under Secure Boot lockdown.
